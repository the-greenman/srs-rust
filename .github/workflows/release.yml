name: Release

# Publish a GitHub Release with a prebuilt `srs` CLI binary on every merge to
# master (i.e. every merged PR). Each run produces a uniquely tagged release
# since the workspace version is pinned.
on:
  push:
    branches: [master]

# The default GITHUB_TOKEN needs write access to create releases and tags.
permissions:
  contents: write

# Avoid two merges racing to create releases at the same time.
concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    name: Build and Release (linux x86_64)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - name: Build release binary
        run: cargo build --release -p srs

      - name: Package binary
        id: package
        run: |
          set -euo pipefail
          version=$(cargo metadata --no-deps --format-version 1 \
            | jq -r '.packages[] | select(.name == "srs") | .version')
          sha_short=$(git rev-parse --short HEAD)
          tag="v${version}-build.${{ github.run_number }}"
          # Stable, build-independent asset names so the
          # /releases/latest/download/<name> URL never changes between builds.
          archive="srs-x86_64-unknown-linux-gnu.tar.gz"
          tar -czf "$archive" -C target/release srs
          sha256sum "$archive" > "$archive.sha256"
          {
            echo "version=$version"
            echo "sha_short=$sha_short"
            echo "tag=$tag"
            echo "archive=$archive"
          } >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${{ steps.package.outputs.tag }}" \
            "${{ steps.package.outputs.archive }}" \
            "${{ steps.package.outputs.archive }}.sha256" \
            --target "${{ github.sha }}" \
            --title "srs v${{ steps.package.outputs.version }} (build ${{ github.run_number }}, ${{ steps.package.outputs.sha_short }})" \
            --notes "Automated release of the \`srs\` CLI built from \`${{ github.sha }}\`.

          **Platform:** \`x86_64-unknown-linux-gnu\`

          Stable download URL (always resolves to the newest build):
          \`\`\`bash
          curl -fsSL https://github.com/${{ github.repository }}/releases/latest/download/${{ steps.package.outputs.archive }} | tar -xz
          ./srs --help
          \`\`\`

          A matching \`${{ steps.package.outputs.archive }}.sha256\` is attached for verification." \
            --latest
